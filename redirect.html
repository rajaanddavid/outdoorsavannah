<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>
    <link rel="preload" href="/amazonLinks.json" as="fetch" type="application/json" crossorigin="anonymous">
</head>
<body>

<script>
    (async function() {
        // --- Browser / Device Detection ---
        function isMobile() { return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); }
        function isAndroid() { return /Android/i.test(navigator.userAgent); }
        function isIOS() { return /iPhone|iPad|iPod/i.test(navigator.userAgent); }
        function isAppBrowser() { return /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|Threads|Barcelona/i.test(navigator.userAgent); }
        function isFacebookBrowser() { return /FBAN\/FBIOS|FBAV|FB_IAB|FB4A/i.test(navigator.userAgent); }

        // --- Query string to get product path ---
        const params = new URLSearchParams(window.location.search);
        const productPath = params.get('product'); // e.g., "product/leash"
        if (!productPath) {
            document.body.innerHTML = '<p>Error: No product specified.</p>';
            return;
        }

        // --- Helpers for redirect script ---
        function getProductName() {
            const segments = productPath.split('/').filter(Boolean);
            if (segments[0] === 'product') segments.shift();
            return segments.join('/');
        }

        try {
            // --- Load Amazon links first ---
            const amazonLinksRes = await fetch('/amazonLinks.json');
            const amazonLinks = await amazonLinksRes.json();
            const productName = getProductName();
            const productLinks = amazonLinks[productName];
            if (!productLinks) return;

            const variant = (params.get('variant') || '').toLowerCase();
            const validKeys = Object.keys(productLinks).filter(
                k => !k.endsWith('_deeplink_ios') && !k.endsWith('_deeplink_android')
            );
            const targetKey = validKeys.includes(variant) ? variant : validKeys[0];
            const targetLink = targetKey ? productLinks[targetKey] : null;
            if (!targetLink) return;

            // --- NEW: fast desktop redirect ---
            if (!isMobile || !isAppBrowser) {
                window.location.href = targetLink;
                return; // skip the rest
            }

            // --- Fetch original product page HTML (mobile / app browser only) ---
            const res = await fetch('/' + productPath + '/'); // must exist as /product/leash/index.html
            const html = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');

            // --- Append product head (don't wipe existing <head>) ---
            Array.from(doc.head.children).forEach(node => {
                const clone = node.cloneNode(true);

                // --- Minimal addition: convert relative URLs to absolute ---
                if (clone.tagName === 'LINK' && clone.href && clone.href.startsWith('/')) {
                    clone.href = window.location.origin + clone.getAttribute('href');
                }
                if (clone.tagName === 'SCRIPT' && clone.src && clone.src.startsWith('/')) {
                    clone.src = window.location.origin + clone.getAttribute('src');
                }

                document.head.appendChild(clone);
            });
            console.log("Head elements from product page appended.");

            // --- Replace body content ---
            const container = document.createElement('div');
            container.innerHTML = doc.body.innerHTML;
            document.body.appendChild(container);

            // --- Unified link updater ---
            function updateAllLinks(productName, amazonLinks) {
                const links = amazonLinks[productName];
                if (!links) return;

                // Update buttons (if any)
                document.querySelectorAll('.wp-block-button.buy-button .wp-block-button__link').forEach(btn => {
                    const key = (btn.getAttribute('title') || '').trim().toLowerCase();
                    if (key && links[key]) btn.href = links[key];
                    else if (links.amazon) btn.href = links.amazon; // fallback to main amazon link
                });

                // Update inline extralinks
                document.querySelectorAll('a[title^="extralink"]').forEach(link => {
                    const key = (link.getAttribute('title') || '').trim().toLowerCase();
                    if (key && links[key]) link.href = links[key];
                    else {
                        // fallback to first extralink in JSON
                        const fallback = Object.keys(links).find(k => k.startsWith('extralink'));
                        if (fallback) link.href = links[fallback];
                    }
                });
            }

            updateAllLinks(productName, amazonLinks);

            // --- Update header for app/mobile ---
            const entryHeader = document.querySelector('.entry-title');
            if (entryHeader) {
                if (isAppBrowser()) {
                    if (isAndroid()) entryHeader.textContent = "Redirecting... please continue";
                    else if (isIOS()) {
                        if (isFacebookBrowser()) entryHeader.textContent = "Redirecting... please open app";
                        else entryHeader.textContent = "Redirecting... please wait";
                    }
                } else if (isAndroid()) entryHeader.textContent = "Allow or tap again";
                else if (isIOS()) entryHeader.textContent = "Redirecting... please wait";
            }

            // --- Mobile / App Browser: load Auditzy ---
            const auditzyScript = document.createElement('script');
            auditzyScript.src = "https://rum.auditzy.com/rOGtCPfa-www.outdoorsavannah.com-iar.js";
            auditzyScript.async = true;
            document.head.appendChild(auditzyScript);

            auditzyScript.onload = function() {
                sessionStorage.setItem('redirected', 'true');
                setTimeout(() => {
                    if (isAndroid()) window.open(targetLink, '_blank');
                    else window.location.href = targetLink;
                }, 1500);
            };

            auditzyScript.onerror = function() {
                if (isAndroid()) window.open(targetLink, '_blank');
                else window.location.href = targetLink;
            };

        } catch(e) {
            document.body.innerHTML = '<p>Failed to load product page.</p>';
            console.error(e);
        }

    })();
</script>
</body>
</html>
