<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>

    <!-- Google Tag Manager -->
    <script>
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-NBJRDCGV');
    </script>
    <!-- End Google Tag Manager -->

</head>
<body>
<div class="loading-message">Loading product...</div>

<script>
    (async function() {
        // --- Browser / Device Detection ---
        const ua = navigator.userAgent;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isAppBrowser = /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|Threads|Barcelona/i.test(ua);

        // --- Get product and variant from query string ---
        const params = new URLSearchParams(window.location.search);
        const productPath = params.get('product');
        const variant = params.get('variant');

        if (!productPath || !variant) {
            document.body.innerHTML = '<p>Error: Missing product or variant parameter.</p>';
            return;
        }

        const productName = productPath.replace(/^product\//, '').toLowerCase();
        const variantKey = variant.toLowerCase();

        // --- Fire GA4 event ---
        if (window.gtag) {
            gtag('event', 'redirect_info', {
                product: productName,
                target: variantKey,
                referrer: document.referrer || 'direct',
                user_agent: navigator.userAgent,
                transport_type: 'beacon'
            });
        }

        try {
            // --- Load Amazon links ---
            const res = await fetch('/amazonLinks.json');
            const amazonLinks = await res.json();
            const links = amazonLinks[productName];
            if (!links) {
                document.body.innerHTML = '<p>Error: Product not found in Amazon links.</p>';
                return;
            }

            // --- Determine redirect URL ---
            const validKeys = Object.keys(links).filter(k => !k.endsWith('_deeplink_ios') && !k.endsWith('_deeplink_android'));
            const targetKey = validKeys.includes(variantKey) ? variantKey : validKeys[0];
            const targetLink = links[targetKey];

            if (!targetLink) {
                document.body.innerHTML = '<p>Error: Target link not found.</p>';
                return;
            }

            // Preserve other query params except product & variant
            let finalRedirect = new URL(targetLink, window.location.origin);
            params.forEach((value, key) => {
                if (key !== 'product' && key !== 'variant') {
                    finalRedirect.searchParams.set(key, value);
                }
            });

            // --- Redirect logic ---
            if (!isMobile || !isAppBrowser) {
                // Desktop / external mobile: immediate redirect
                window.location.href = finalRedirect.toString();
            } else {
                // Mobile / App Browser: load Auditzy first
                const auditzyScript = document.createElement('script');
                auditzyScript.src = "https://rum.auditzy.com/rOGtCPfa-www.outdoorsavannah.com-iar.js";
                auditzyScript.async = true;
                document.head.appendChild(auditzyScript);

                auditzyScript.onload = function() {
                    sessionStorage.setItem('redirected', 'true');
                    setTimeout(() => {
                        if (isAndroid) window.open(finalRedirect.toString(), '_blank');
                        else window.location.href = finalRedirect.toString();
                    }, 1500);
                };

                auditzyScript.onerror = function() {
                    if (isAndroid) window.open(finalRedirect.toString(), '_blank');
                    else window.location.href = finalRedirect.toString();
                };
            }

        } catch(e) {
            document.body.innerHTML = '<p>Failed to load product links.</p>';
            console.error(e);
        }
    })();
</script>
</body>
</html>
