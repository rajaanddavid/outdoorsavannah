<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>

    <!-- Fallback meta refresh (JS-disabled or blocked) -->
    <meta http-equiv="refresh" content="1;url=#fallback">

    <!-- Google Tag Manager -->
    <script>
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-NBJRDCGV');
    </script>
</head>
<body>
<div class="loading-message">Loading product...</div>

<script>
    (async function() {
        // --- Browser / Device Detection ---
        const ua = navigator.userAgent;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isAppBrowser = /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|Threads|Barcelona/i.test(ua);
        const isFacebookBrowser = /FBAN\/FBIOS|FBAV|FB_IAB|FB4A/i.test(ua);

        // --- Parse query string and hash ---
        const params = new URLSearchParams(window.location.search);
        const productPath = params.get('product'); // e.g., "product/leash"
        if (!productPath) {
            document.body.innerHTML = '<p>Error: No product specified.</p>';
            return;
        }
        const productName = productPath.replace(/^product\//, '');
        const hash = (window.location.hash || '').substring(1).toLowerCase();

        // --- Fire GA4 redirect event ---
        if (window.gtag) {
            gtag('event', 'redirect_info', {
                product: productName,
                target: hash || 'main',
                referrer: document.referrer || 'direct',
                user_agent: navigator.userAgent,
                transport_type: 'beacon'
            });
        }

        try {
            // --- Load Amazon links ---
            const res = await fetch('/amazonLinks.json');
            const amazonLinks = await res.json();
            const links = amazonLinks[productName];
            if (!links) {
                document.body.innerHTML = '<p>Error: Product not found.</p>';
                return;
            }

            // --- Determine target link ---
            const validKeys = Object.keys(links).filter(k => !k.endsWith('_deeplink_ios') && !k.endsWith('_deeplink_android'));
            const targetKey = validKeys.includes(hash) ? hash : validKeys[0];
            const targetLink = targetKey ? links[targetKey] : null;
            if (!targetLink) {
                document.body.innerHTML = '<p>Error: Target link not found.</p>';
                return;
            }

            let redirectLink = targetLink;

            if (isAppBrowser && window.location.hash) {
                const hashParam = encodeURIComponent(window.location.hash.substring(1));
                redirectLink += (redirectLink.includes('?') ? '&' : '?') + 'variant=' + hashParam;
            }

            if (!isMobile || !isAppBrowser) {
                // Desktop or non-app mobile: immediate redirect
                window.location.href = redirectLink;
            } else {
                // Mobile / App Browser
                const auditzyScript = document.createElement('script');
                auditzyScript.src = "https://rum.auditzy.com/rOGtCPfa-www.outdoorsavannah.com-iar.js";
                auditzyScript.async = true;
                document.head.appendChild(auditzyScript);

                auditzyScript.onload = function() {
                    console.log("Auditzy script loaded.");
                    sessionStorage.setItem('redirected', 'true');
                    setTimeout(() => {
                        if (isAndroid) window.open(redirectLink, '_blank'); // Android opens in new tab
                        else window.location.href = redirectLink;          // iOS / other: direct
                    }, 1500);
                };

                auditzyScript.onerror = function() {
                    console.warn("Auditzy script failed to load, redirecting anyway.");
                    if (isAndroid) window.open(redirectLink, '_blank');
                    else window.location.href = redirectLink;
                };
            }
        } catch (e) {
            document.body.innerHTML = '<p>Failed to load product links.</p>';
            console.error(e);
        }
    })();
</script>
</body>
</html>
