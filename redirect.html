<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>
    <link rel="preload" href="/amazonLinks.json" as="fetch" type="application/json" crossorigin="anonymous">
    <style>
        /* Reset any default styling */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>

<script>
    (async function() {
        // --- Browser / Device Detection ---
        function isMobile() { return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); }
        function isAndroid() { return /Android/i.test(navigator.userAgent); }
        function isIOS() { return /iPhone|iPad|iPod/i.test(navigator.userAgent); }
        function isAppBrowser() { return /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|MetaIAB|Threads|Barcelona/i.test(navigator.userAgent); }
        function isFacebookBrowser() { return /FBAN\/FBIOS|FBAV|FB_IAB|FB4A|MetaIAB/i.test(navigator.userAgent); }

        // --- Query string to get product path ---
        const params = new URLSearchParams(window.location.search);
        // --- If user is returning from Meta app, skip deeplink ---
        // --- Check skipDeeplink param instead of fbclid ---
        const skipDeeplink = params.get('skipDeeplink') === 'true';
        const productPath = params.get('product'); // e.g., "product/leash"
        if (!productPath) {
            document.body.innerHTML = '<p>Error: No product specified.</p>';
            return;
        }

        // --- Fetch original product page HTML ---
        let fetchPath = '/' + productPath + '/';
        if (productPath === 'home' || productPath === 'amazon') fetchPath = '/'; // homepage or amazon storefront
        const res = await fetch(fetchPath);
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');

        // --- Helper to fix relative URLs ---
        function fixUrl(url) {
            if (!url || url.startsWith('http://') || url.startsWith('https://') || url.startsWith('//')) {
                return url;
            }
            if (url.startsWith('/')) {
                return window.location.origin + url;
            }
            // Handle relative paths like '../' or 'assets/'
            const base = window.location.origin + fetchPath.replace(/[^/]*$/, '');
            return new URL(url, base).href;
        }

        // --- Preload main image ---
        const ogImage = doc.querySelector('meta[property="og:image"]');
        if (ogImage && ogImage.content) {
            const link = document.createElement('link');
            link.rel = 'preload';
            link.as = 'image';
            link.href = fixUrl(ogImage.content);
            document.head.appendChild(link);

            // Optional hidden image for faster load
            const img = new Image();
            img.src = fixUrl(ogImage.content);
        }

        // --- Clear current head (except initial meta/title) ---
        const initialElements = ['meta[charset]', 'meta[name="viewport"]', 'meta[name="robots"]', 'title', 'link[rel="preload"]'];
        Array.from(document.head.children).forEach(node => {
            const isInitial = initialElements.some(sel => node.matches?.(sel));
            if (!isInitial) node.remove();
        });

        // --- Append head elements with fixed URLs ---
        Array.from(doc.head.children).forEach(node => {
            const clone = node.cloneNode(true);

            // Fix link href
            if (clone.tagName === 'LINK' && clone.href) {
                clone.href = fixUrl(clone.getAttribute('href'));
            }

            // Fix script src
            if (clone.tagName === 'SCRIPT' && clone.src) {
                clone.src = fixUrl(clone.getAttribute('src'));
            }

            // Fix style URLs (background images, etc.)
            if (clone.tagName === 'STYLE' && clone.textContent) {
                clone.textContent = clone.textContent.replace(
                    /url\(['"]?([^'"()]+)['"]?\)/g,
                    (match, url) => `url('${fixUrl(url)}')`
                );
            }

            document.head.appendChild(clone);
        });

        // --- Copy html and body attributes ---
        Array.from(doc.documentElement.attributes).forEach(attr => {
            document.documentElement.setAttribute(attr.name, attr.value);
        });

        Array.from(doc.body.attributes).forEach(attr => {
            document.body.setAttribute(attr.name, attr.value);
        });

        // --- Append body <style> tags to head ---
        Array.from(doc.body.querySelectorAll('style')).forEach(styleTag => {
            const clone = styleTag.cloneNode(true);
            if (clone.textContent) {
                clone.textContent = clone.textContent.replace(
                    /url\(['"]?([^'"()]+)['"]?\)/g,
                    (match, url) => `url('${fixUrl(url)}')`
                );
            }
            document.head.appendChild(clone);
        });

        // --- Copy body attributes and styles ---
        // Copy all body attributes (class, style, etc.)
        Array.from(doc.body.attributes).forEach(attr => {
            document.body.setAttribute(attr.name, attr.value);
        });

        // --- Clear body and replace content ---
        Array.from(doc.body.childNodes).forEach(node => {
            const clone = node.cloneNode(true);

            // Fix image sources
            if (clone.nodeType === 1) { // Element node
                clone.querySelectorAll?.('img[src], source[srcset], img[srcset]').forEach(img => {
                    if (img.src) img.src = fixUrl(img.getAttribute('src'));
                    if (img.srcset) {
                        img.srcset = img.srcset.split(',').map(src => {
                            const parts = src.trim().split(/\s+/);
                            parts[0] = fixUrl(parts[0]);
                            return parts.join(' ');
                        }).join(', ');
                    }
                });
            }

            document.body.appendChild(clone);
        });

        // --- Re-execute scripts ---
        const scripts = Array.from(doc.body.querySelectorAll('script'));
        for (const script of scripts) {
            const s = document.createElement('script');
            if (script.src) {
                s.src = fixUrl(script.getAttribute('src'));
                // Wait for external scripts to load
                if (script.src) {
                    await new Promise((resolve) => {
                        s.onload = resolve;
                        s.onerror = resolve;
                        document.body.appendChild(s);
                    });
                    continue;
                }
            } else {
                s.textContent = script.textContent;
            }
            document.body.appendChild(s);
        }

        // Check if we're on the homepage path
        if (productPath === 'home') {
            document.body.classList.add('page-id-5');
        }

        function getProductName() {
            const segments = productPath.split('/').filter(Boolean);
            if (segments[0] === 'product') segments.shift();
            return segments.join('/');
        }

        // --- Android normalizeIntentLink ---
        function normalizeIntentLink(url) {
            if (!url) return url;
            try {
                if (url.startsWith("intent://")) {
                    const [prefix, intentPart] = url.split("#Intent;");
                    if (!intentPart) return url;
                    const cleaned = intentPart
                        .split(";")
                        .filter(part =>
                            !part.startsWith("package=") &&
                            !part.startsWith("component=") &&
                            !part.startsWith("S.browser_fallback_url=")
                        )
                        .join(";");
                    return `${prefix}#Intent;${cleaned};scheme=https;action=android.intent.action.VIEW;end`.replace(/;;+/g, ";");
                }
                if (/^[a-zA-Z0-9.]+:\/\//.test(url)) {
                    const httpsUrl = url.replace(/^[a-zA-Z0-9.]+:\/\//, "https://");
                    return `intent://${httpsUrl.replace(/^https?:\/\//, "")}#Intent;scheme=https;action=android.intent.action.VIEW;end`;
                }
                return url;
            } catch {
                return url;
            }
        }

        try {
            // --- Load Amazon links ---
            const amazonLinksRes = await fetch('/amazonLinks.json');
            const amazonLinks = await amazonLinksRes.json();
            const productName = getProductName();
            const productLinks = amazonLinks[productName];
            if (!productLinks) return;

            const variant = (params.get('variant') || '').toLowerCase();
            const validKeys = Object.keys(productLinks).filter(
                k => !k.endsWith('_deeplink_ios') && !k.endsWith('_deeplink_android')
            );
            const targetKey = validKeys.includes(variant) ? variant : validKeys[0];
            const targetLink = targetKey ? productLinks[targetKey] : null;
            if (!targetLink) return;

            function updateAllLinksSimple(productName, amazonLinks) {
                const links = amazonLinks[productName];
                if (!links) return;

                // Select all relevant links
                const allLinks = document.querySelectorAll(
                    '.wp-block-button.buy-button .wp-block-button__link, a[title^="extralink"], li[id^="extralink"] a'
                );

                allLinks.forEach(linkEl => {
                    let key = null;

                    // Buy button: last word in text
                    if (linkEl.classList.contains('wp-block-button__link')) {
                        const text = linkEl.textContent.trim();
                        const match = text.match(/Buy on\s+([\w-]+)/i);
                        if (match) key = match[1].toLowerCase();
                    }

                    // Title starts with extralink
                    if (!key && linkEl.hasAttribute('title')) {
                        const title = linkEl.getAttribute('title').trim();
                        const match = title.match(/^extralink[-_]?([\w-]+)/i);
                        if (match) key = match[1].toLowerCase();
                    }

                    // li[id^="extralink"] a
                    if (!key && linkEl.closest('li[id^="extralink"]')) {
                        const li = linkEl.closest('li[id^="extralink"]');
                        const idMatch = li.id.match(/^extralink[-_]?([\w-]+)/i);
                        if (idMatch) key = idMatch[1].toLowerCase();
                    }

                    // Fallback: infer from URL
                    if (!key && linkEl.href) {
                        if (linkEl.href.includes('amazon')) key = 'amazon';
                        else if (linkEl.href.includes('aliexpress')) key = 'aliexpress';
                    }

                    if (!key) return;

                    // Set link to web target from amazonLinks.json
                    const newHref = links[key] || Object.values(links).find(v => typeof v === 'string');
                    if (newHref) {
                        linkEl.href = newHref;
                        linkEl.target = '_blank';
                        linkEl.rel = 'noopener noreferrer nofollow';
                    }
                });
            }

            updateAllLinksSimple(productName, amazonLinks);

            // --- Update header ---
            const entryHeader = document.querySelector('.entry-title');
            if (entryHeader) {
                if (isAppBrowser()) {
                    if (isAndroid()) entryHeader.textContent = "Redirecting... please continue";
                    else if (isIOS()) {
                        if (isFacebookBrowser()) entryHeader.textContent = "Redirecting... please open app";
                        else entryHeader.textContent = "Redirecting... please wait";
                    }
                } else if (isAndroid()) entryHeader.textContent = "Allow or tap again";
                else if (isIOS()) entryHeader.textContent = "Redirecting... please wait";
            }

            // --- Fast desktop redirect ---
            if (!isMobile()) {
                window.location.href = targetLink;
                return;
            }

            if (isMobile() && !sessionStorage.getItem('redirectedOnce')) {
                sessionStorage.setItem('redirectedOnce', 'true');

                // --- Determine primary deeplink ---
                let primaryDeeplink = null;
                if (isAndroid() && productLinks[`${variant}_deeplink_android`]) {
                    primaryDeeplink = productLinks[`${variant}_deeplink_android`];
                } else if (isIOS() && productLinks[`${variant}_deeplink_ios`]) {
                    primaryDeeplink = productLinks[`${variant}_deeplink_ios`];
                } else {
                    if (isAndroid()) primaryDeeplink = productLinks["amazon_deeplink_android"];
                    else if (isIOS()) primaryDeeplink = productLinks["amazon_deeplink_ios"];
                }

                if (!skipDeeplink) {
                    // --- Mobile outside app browser ---
                    if (!isAppBrowser() && primaryDeeplink) {
                        const start = Date.now();
                        window.location.href = primaryDeeplink;
                        setTimeout(() => {
                            if (Date.now() - start < 1500) {
                                window.location.href = targetLink;
                            }
                        }, 1200);
                        return;
                    }

                    // --- In-app browser ---
                    if (isAppBrowser() && primaryDeeplink) {
                        if (isAndroid()) {
                            const start = Date.now();
                            window.location.href = primaryDeeplink;
                            setTimeout(() => {
                                if (Date.now() - start < 1500) {
                                    window.location.href = normalizeIntentLink(primaryDeeplink);
                                }
                            }, 1200);
                        } else if (isIOS()) {
                            const now = Date.now();
                            const iframe = document.createElement('iframe');
                            iframe.style.display = 'none';
                            iframe.src = primaryDeeplink;
                            document.body.appendChild(iframe);

                            setTimeout(() => {
                                const elapsed = Date.now() - now;
                                document.body.removeChild(iframe);

                                if (elapsed < 1200) {
                                    // Deeplink failed, open Safari directly using x-safari-https://
                                    window.location.href = `x-safari-${targetLink}`;
                                }
                            }, 800);
                        }
                        return;
                    }
                }
                // --- Fallback if no deeplink ---
                window.location.href = targetLink;
            }
        } catch(e) {
            document.body.innerHTML = '<p>Failed to load product page.</p>';
            console.error(e);
        }
    })();
</script>
</body>
</html>
