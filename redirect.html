<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting...</title>

    <!-- Google Tag Manager -->
    <script>
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-NBJRDCGV');
    </script>
</head>
<body>
<div class="loading-message">Loading product...</div>

<script>
    (async function() {
        const ua = navigator.userAgent;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(ua);
        const isAndroid = /Android/i.test(ua);
        const isIOS = /iPhone|iPad|iPod/i.test(ua);
        const isAppBrowser = /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|Threads|Barcelona/i.test(ua);

        // --- Parse query string ---
        const params = new URLSearchParams(window.location.search);
        const productPath = params.get('product'); // e.g., "cat-shelf-guide"
        const variantKey = params.get('variant');   // e.g., "extralink17"

        if (!productPath || !variantKey) {
            document.body.innerHTML = '<p>Error: No product or variant specified.</p>';
            return;
        }

        // --- Fire GA4 redirect event ---
        if (window.gtag) {
            gtag('event', 'redirect_info', {
                product: productPath,
                target: variantKey,
                referrer: document.referrer || 'direct',
                user_agent: navigator.userAgent,
                transport_type: 'beacon'
            });
        }

        try {
            // --- Load Amazon links ---
            const res = await fetch('/amazonLinks.json');
            const amazonLinks = await res.json();
            const links = amazonLinks[productPath];
            if (!links || !links[variantKey]) {
                document.body.innerHTML = '<p>Error: Target link not found.</p>';
                return;
            }

            const targetLink = links[variantKey];

            if (!isMobile || !isAppBrowser) {
                // Desktop / external mobile: redirect immediately
                window.location.href = targetLink;
            } else {
                // Mobile / App Browser: load Auditzy first
                const auditzyScript = document.createElement('script');
                auditzyScript.src = "https://rum.auditzy.com/rOGtCPfa-www.outdoorsavannah.com-iar.js";
                auditzyScript.async = true;
                document.head.appendChild(auditzyScript);

                auditzyScript.onload = function() {
                    sessionStorage.setItem('redirected', 'true');
                    setTimeout(() => {
                        if (isAndroid) window.open(targetLink, '_blank');
                        else window.location.href = targetLink;
                    }, 1500);
                };

                auditzyScript.onerror = function() {
                    if (isAndroid) window.open(targetLink, '_blank');
                    else window.location.href = targetLink;
                };
            }

        } catch(e) {
            document.body.innerHTML = '<p>Failed to load product links.</p>';
            console.error(e);
        }
    })();
</script>
</body>
</html>
