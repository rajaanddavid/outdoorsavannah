<script>
document.addEventListener("DOMContentLoaded", function() {
    const url = new URL(window.location.href);

    // --- Extract slug from path ---
    let slug = "sleepypod-mobile-cat-bed";
    const pathSegments = url.pathname.split("/").filter(Boolean);
    if (pathSegments[0] === "preview" && pathSegments[1]) {
        slug = pathSegments[1];

        // Remove variant suffix for normal products
        const protectedSlugs = ["home", "product", "cat-shelf-guide", "amzn"];
        if (!protectedSlugs.includes(slug)) {
            const dashIndex = slug.indexOf("-");
            if (dashIndex > 0) slug = slug.substring(0, dashIndex);
        }
    }

    // --- Determine variant from query ---
    let variant = url.searchParams.get('variant') || "";

    // --- Preserve hash ---
    const hash = url.hash || "";

    // --- Detect platform ---
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // --- Construct redirect URL ---
    let redirectUrl;
    const protectedSlugs = ["home", "product", "cat-shelf-guide", "amzn"];
    if (slug === "amzn" && isAmzn) {
        // amzn special: iOS to redirect.html, Android to /preview/amzn/index.html
        if (isIOS) {
            redirectUrl = "/redirect.html?product=amzn";
        } else {
            redirectUrl = "/preview/amzn/index.html";
        }
    } else if (protectedSlugs.includes(slug)) {
        redirectUrl = "/redirect.html?product=" + slug;
    } else {
        redirectUrl = "/redirect.html?product=product/" + slug;
    }

    if (variant) redirectUrl += "&variant=" + encodeURIComponent(variant);

    // --- Apply x-safari and skipDeeplink for iOS ---
    if (isIOS && slug !== "amzn") {
        redirectUrl = "x-safari-https://www.outdoorsavannah.com" + redirectUrl + hash;
    }

    // --- Redirect ---
    window.location.replace(redirectUrl);
});
