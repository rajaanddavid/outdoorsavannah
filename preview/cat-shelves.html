<meta name="robots" content="noindex, nofollow">

<script>
document.addEventListener("DOMContentLoaded", function() {
    const url = new URL(window.location.href);

    // --- Extract slug from path ---
    let slug = "cat-shelves";
    const pathSegments = url.pathname.split("/").filter(Boolean);
    if (pathSegments[0] === "preview" && pathSegments[1]) {
        slug = pathSegments[1].split("-")[0]; // remove variant suffix
    }

    // --- Determine variant from query ---
    let variant = url.searchParams.get('variant') || "";

    // --- Preserve hash ---
    const hash = url.hash || "";

    // --- Detect platform ---
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // --- Construct redirect URL ---
    let redirectUrl = "/redirect.html?product=product/" + slug;
    if (variant) redirectUrl += "&variant=" + encodeURIComponent(variant);
    if (hash) redirectUrl += hash;

    // --- Apply x-safari only for iOS ---
    if (isIOS) {
        redirectUrl = "x-safari-https://www.outdoorsavannah.com" + redirectUrl;
    }

    // --- Redirect ---
    window.location.replace(redirectUrl);
});
</script>
