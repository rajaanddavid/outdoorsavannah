<script>
document.addEventListener("DOMContentLoaded", function() {
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isAppBrowser = /Instagram|FBAV|FBAN\/FBIOS|FB_IAB|FB4A|MetaIAB|Threads|Barcelona/i.test(navigator.userAgent);

    const url = new URL(window.location.href);
    const variant = url.searchParams.get('variant') || "";
    const hash = url.hash || "";

    // --- Android users ---
    if (isAndroid) {
        // Extract slug from productKey
        const slug = "product/harness".includes('/') ? "product/harness".split('/')[1] : "product/harness";
        window.location.replace("/preview/" + slug + "?product=product/harness" + (variant ? "&variant=" + encodeURIComponent(variant) : "") + hash);
        return;
    }

    // --- iOS users ---
    if (isIOS) {
        // Try to get the iOS deeplink from amazonLinks
        const deeplink = "com.amazon.mobile.shopping.web://amazon.com/PetSafe-Kitty-Glitter-Harness-Bungee/dp/B06XRVFB5K?tag=outdoorsavann-20";

        if (deeplink && deeplink !== "") {
            // Try deeplink in iframe first
            let hasLeftPage = false;

            const handleVisibilityChange = () => {
                if (document.hidden) {
                    hasLeftPage = true;
                }
            };

            document.addEventListener('visibilitychange', handleVisibilityChange);

            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = deeplink;
            document.body.appendChild(iframe);

            // If deeplink fails, fall back to x-safari redirect
            setTimeout(() => {
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                iframe.remove();

                if (!hasLeftPage) {
                    // Deeplink failed, use x-safari redirect
                    const redirectUrl = "/redirect.html?product=product/harness" + (variant ? "&variant=" + encodeURIComponent(variant) : "");
                    window.location.replace("x-safari-https://www.outdoorsavannah.com" + redirectUrl + hash);
                }
            }, 1000);
        } else {
            // No deeplink available, go straight to x-safari redirect
            const redirectUrl = "/redirect.html?product=product/harness" + (variant ? "&variant=" + encodeURIComponent(variant) : "");
            window.location.replace("x-safari-https://www.outdoorsavannah.com" + redirectUrl + hash);
        }
    }
});
</script>
