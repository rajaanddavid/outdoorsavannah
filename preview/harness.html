<script>
document.addEventListener("DOMContentLoaded", function() {
    const url = new URL(window.location.href);
    const pathSegments = url.pathname.split("/").filter(Boolean);

    // --- Extract slug ---
    let slug = pathSegments[1] || "home"; // default slug
    let variant = url.searchParams.get('variant') || "";
    const hash = url.hash || "";

    // --- Protected slugs ---
    const protectedSlugs = ["home", "product", "cat-shelf-guide"];

    // --- Detect platform ---
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // --- Construct redirectUrl ---
    let redirectUrl;

    if (pathSegments[0] === "preview" && slug === "amzn") {
        // --- amzn folder ---
        const amznVariant = variant || "index";
        redirectUrl = "/redirect.html?product=amzn/" + amznVariant;
    } else if (protectedSlugs.includes(slug)) {
        redirectUrl = "/redirect.html?product=" + slug;
    } else {
        redirectUrl = "/redirect.html?product=product/" + slug;
    }

    if (variant && slug !== "amzn") {
        redirectUrl += "&variant=" + encodeURIComponent(variant);
    }

    // --- Apply x-safari for iOS ---
    if (isIOS) {
        redirectUrl = "x-safari-https://www.outdoorsavannah.com" + redirectUrl + hash;
    } else {
        // --- Android: keep redirect structure but without x-safari ---
        redirectUrl = "/preview/amzn" + "?product=" + redirectUrl.split("?product=")[1] + hash;
    }

    // --- Redirect ---
    window.location.replace(redirectUrl);
});
</script>
